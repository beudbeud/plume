name: Build Test

on:
  push:
    # Don't run for tags
    tags-ignore:
      - '**'
    branches:
      - '**'
env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  test-linux:
    name: SDL2 ${{ matrix.sdl_target }} on Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdl_target: [ '2.0.0', '2.0.5', '2.0.9', '2.0.14', '2.0.24' ]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run apt-get update
        shell: bash
        run: sudo apt-get -y -qq update

      - name: Install Dependencies
        shell: bash
        # protobuf-c-compiler is needed because CMakeLists.txt does
        # `find_program(PROTOC_C protoc-c REQUIRED)` at configure time when
        # IHSLIB_CODEGEN is ON (the default for top-level builds). The previous
        # workflow tried to suppress it via `-DIHSLIB_CODEGEN=OFF` but the YAML
        # line-continuation mangled the argument; install the tool instead.
        run: sudo apt-get -y -qq install libprotobuf-c-dev libmbedtls-dev libsdl2-dev protobuf-c-compiler --no-install-recommends --no-install-suggests

      - name: Create Build Environment
        # Some projects don't allow in-source building, so create a separate build directory
        # We'll use this as our working directory for all subsequent commands
        run: cmake -E make_directory ${{github.workspace}}/build

      - name: Configure CMake
        # Use a bash shell, so we can use the same syntax for environment variable
        # access regardless of the host operating system
        shell: bash
        working-directory: ${{github.workspace}}/build
        run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DIHSLIB_SDL_TARGETVERSION=${{ matrix.sdl_target }}


      - name: Build
        shell: bash
        working-directory: ${{github.workspace}}/build
        run: cmake --build .

      - name: Test
        shell: bash
        working-directory: ${{github.workspace}}/build
        run: ctest

  test-linux-sanitizers:
    name: ${{ matrix.sanitizer }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: ASan+UBSan
            cmake_flags: -DIHSLIB_SANITIZE_ADDRESS=ON -DIHSLIB_SANITIZE_UNDEFINED=ON
            env: |
              ASAN_OPTIONS=halt_on_error=1:print_stacktrace=1:detect_leaks=1
              UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1
          - sanitizer: TSan
            cmake_flags: -DIHSLIB_SANITIZE_THREAD=ON
            env: |
              TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        shell: bash
        run: |
          sudo apt-get -y -qq update
          sudo apt-get -y -qq install libprotobuf-c-dev libmbedtls-dev libsdl2-dev protobuf-c-compiler \
            --no-install-recommends --no-install-suggests

      - name: Configure CMake
        shell: bash
        # Debug build so sanitizer stack traces have line numbers.
        run: |
          cmake -S ${{github.workspace}} -B ${{github.workspace}}/build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DIHSLIB_SDL_TARGETVERSION=2.0.24 \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: cmake --build ${{github.workspace}}/build

      - name: Test
        shell: bash
        working-directory: ${{github.workspace}}/build
        # Convert the multiline env into VAR=val exports, then run ctest.
        # Each test failure surfaces a sanitizer trace via --output-on-failure.
        run: |
          while IFS= read -r line; do
            [[ -n "$line" ]] && export "$line"
          done <<< '${{ matrix.env }}'
          ctest --output-on-failure
